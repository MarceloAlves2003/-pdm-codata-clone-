version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data  # <-- ISSO SALVA SEUS DADOS NO HD
    environment:
      - POSTGRES_DB=codata_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres

  web:
    build: .
    restart: on-failure
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/codata_db
    depends_on:
      - db

volumes:
  postgres_data: # <-- DEFINE O ESPAÇO NO HD PARA O BANCO